<!DOCTYPE html>
<html>

<head>

<title>Love Login ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="loginBox">

<h1>Our Space ❤️</h1>

<input type="password" id="secretCode" placeholder="Secret Code">

<input type="text" id="username" placeholder="Your Name">

<input type="file" id="profileInput" accept="image/*" capture="user">

<button onclick="login()">Enter Chat</button>

</div>

<script>

function login(){

const code = document.getElementById("secretCode").value;

const username = document.getElementById("username").value;

const file = document.getElementById("profileInput").files[0];

if(code !== "nkissesflowers"){

alert("Wrong Secret Code ❤️");

return;

}

if(username.trim() === ""){

alert("Enter your name ❤️");

return;

}

if(!file){

alert("Choose a profile picture ❤️");

return;

}

const reader = new FileReader();

reader.onload = function(e){

localStorage.setItem("username", username);

localStorage.setItem("profilePic", e.target.result);

window.location.href = "chat.html";

};

reader.readAsDataURL(file);

}

</script>

</body>

</html>
