<!DOCTYPE html>
<html>

<head>

<title>Our Space ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="loginBox">

<h1>Our Space ❤️</h1>

<input type="password" id="secretCode" placeholder="Secret Code">

<button id="googleLogin">Login With Google ❤️</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCFhF-Q0cSvHLe962frKH59QSKNHx-IauE",
authDomain: "nucaineyha.firebaseapp.com",
databaseURL: "https://nucaineyha-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "nucaineyha",
storageBucket: "nucaineyha.firebasestorage.app",
messagingSenderId: "692881987074",
appId: "1:692881987074:web:01d3f578d3729d51ccf91b"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").addEventListener("click", async ()=>{

const code = document.getElementById("secretCode").value;

if(code !== "nkissesflowers"){

alert("Wrong Secret Code ❤️");

return;

}

try{

const result = await signInWithPopup(auth, provider);

const user = result.user;

localStorage.setItem("username", user.displayName);

localStorage.setItem("profilePic", user.photoURL);

window.location.href = "chat.html";

}

catch(error){

alert(error.message);

}

});

</script>

</body>

</html>
